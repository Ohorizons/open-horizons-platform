# Checkov suppressions for Open Horizons
#
# Each suppression below documents the architectural rationale for why
# a given Checkov rule is intentionally skipped. Only rules that are
# either (a) addressed by a different control in the platform or
# (b) intentional design decisions for a customer-facing template
# should appear here. Customer forks SHOULD review every entry and
# decide whether to keep, remove, or harden further.

skip-check:
  # AKS — public cluster is the default for the customer template so
  # the install wizard works without VPN/Bastion. Customers running
  # in production should set `private_cluster: true` (Large/XLarge
  # profiles in config/sizing-profiles.yaml). Documented in
  # docs/guides/PREREQUISITES.md §8.
  - CKV_AZURE_6      # AKS API server should have authorized IP ranges
  - CKV_AZURE_115    # AKS should be private cluster
  - CKV_AZURE_117    # AKS should use disk encryption set
  - CKV_AZURE_141    # AKS local accounts should be disabled
  - CKV_AZURE_168    # Ensure node pool max_pods configured (default OK)
  - CKV_AZURE_171    # Ensure AKS automated upgrades configured (handled via Terraform var)
  - CKV_AZURE_226    # Ensure AKS uses ephemeral OS disks (size profile dependent)
  - CKV_AZURE_227    # Ensure AKS host-based encryption (require Standard tier)

  # ACR — public network access toggled by the install wizard's
  # `private_endpoint` flag. Default is public to allow customer
  # OnDemand pulls during initial deploy.
  - CKV_AZURE_164    # Ensure ACR has zone redundancy (Premium tier only)
  - CKV_AZURE_165    # Ensure geo-replicated ACR (Premium tier only)
  - CKV_AZURE_167    # Ensure ACR has dedicated data endpoint (Premium tier only)
  - CKV_AZURE_233    # Ensure ACR uses zone redundancy
  - CKV2_AZURE_30    # Ensure container registries enable retention policy

  # Networking — the platform creates a hub/spoke ready VNet but
  # leaves NSG flow logs / DDoS plan to the customer subscription
  # since both incur additional cost. Documented in PREREQUISITES.md.
  - CKV_AZURE_160    # NSG flow logs (customer-controlled cost)
  - CKV2_AZURE_31    # Ensure VNET has DDoS Protection Plan (customer cost)

  # Defender / Security — pricing tier is environment-specific.
  # Defaults to Standard for production profiles; Free for dev to
  # avoid surprise bills. Documented in PREREQUISITES.md §9.
  - CKV_AZURE_19     # Ensure SecurityCenter contact emails set (post-deploy step)
  - CKV_AZURE_55     # Auto-provisioning of Log Analytics agent
  - CKV_AZURE_61     # Ensure that 'Notify about alerts with the following severity' (env-specific)
  - CKV_AZURE_69     # Defender for App Service Plan (env-specific)
  - CKV_AZURE_84     # Ensure 'Microsoft Defender for SQL' (env-specific)
  - CKV_AZURE_87     # Ensure 'Microsoft Defender for DNS' (env-specific)
  - CKV_AZURE_114    # Ensure key vault has firewall enabled (managed via service endpoints)

  # Cost Management / Budgets — the cost-management module creates
  # action groups for budget alerts. The notifications are config'd
  # post-deploy with customer email addresses.
  - CKV2_AZURE_21    # Ensure storage accounts logging enabled (customer-controlled)
  - CKV_AZURE_33     # Ensure Storage logging is enabled for Queue service
  - CKV_AZURE_190    # Ensure storage blobs restrict public access
  - CKV_AZURE_206    # Ensure storage accounts use customer-managed key

  # AI Foundry / Cognitive Services — local auth is required for the
  # model deployment workflow. Network rules are inherited from the
  # parent VNet. Public access is disabled when using the install
  # wizard's "private endpoints" toggle.
  - CKV2_AZURE_22    # Ensure that storage accounts use customer-managed key (CMK)
  - CKV_AZURE_236    # Ensure cognitive services accounts disable local auth (model SDK requires)
  - CKV_AZURE_247    # Ensure Azure AI Services enables managed identity (handled separately)

  # PostgreSQL Flexible — geo-redundant backup and customer-managed
  # keys are size-profile specific. Enabled in Large/XLarge profiles
  # via config/sizing-profiles.yaml.
  - CKV2_AZURE_26    # Ensure that PostgreSQL Flexible server has geo-redundant backup enabled (L/XL only)
  - CKV2_AZURE_57    # Ensure PostgreSQL Flexible Server uses customer-managed key

  # Disaster Recovery — the DR runbook orchestrates failover with
  # customer-specific thresholds. Defaults are deliberate.
  - CKV2_AZURE_33    # Ensure storage account uses customer-managed key
  - CKV2_AZURE_40    # Ensure storage account is not configured with Shared Key authorization
  - CKV2_AZURE_41    # Ensure storage account uses customer-managed key for encryption
  - CKV2_AZURE_47    # Ensure storage accounts allow access from trusted Microsoft services
  - CKV_AZURE_41     # Ensure 'Notify about alerts with the following severity' (env-specific)

# Soft-fail keeps the workflow non-blocking; fixed errors should
# move out of skip-check above and the workflow should be made
# blocking once the catalog is clean.
soft-fail: true
