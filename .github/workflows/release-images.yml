name: release-images

# Builds and publishes Open Horizons container images to GHCR.
# Triggered by version tags (vX.Y.Z) or manually via workflow_dispatch.
# Images are published as PUBLIC under ghcr.io/ohorizons/*.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v7.2.3 or v7.2.3-rc1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ohorizons

jobs:
  build:
    name: build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: ohorizons-backstage
            context: backstage
            dockerfile: backstage/Dockerfile.acr
          - name: ohorizons-agent-api
            context: backstage/server/agent-api
            dockerfile: backstage/server/agent-api/Dockerfile
          - name: ohorizons-agent-api-impact
            context: backstage/server/agent-api-impact
            dockerfile: backstage/server/agent-api-impact/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (Backstage only)
        if: matrix.image.name == 'ohorizons-backstage'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Backstage bundle
        if: matrix.image.name == 'ohorizons-backstage'
        working-directory: backstage
        run: |
          corepack enable
          yarn install --immutable
          yarn build:backend --config app-config.yaml --config app-config.production.yaml

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.tag, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.description=Open Horizons — Agentic DevOps Platform
            org.opencontainers.image.source=https://github.com/Ohorizons/open-horizons-platform
            org.opencontainers.image.url=https://ohorizons.ai
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Open Horizons

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

      - name: Generate build attestation
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Scan image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.image.name)) != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

  summary:
    name: summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "## Open Horizons release-images"
            echo ""
            echo "Tag: \`${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}\`"
            echo ""
            echo "| Image | Pull command |"
            echo "|---|---|"
            for img in ohorizons-backstage ohorizons-agent-api ohorizons-agent-api-impact; do
              echo "| \`$img\` | \`docker pull ghcr.io/ohorizons/$img:${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
