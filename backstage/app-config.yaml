# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: false

# MCP Actions — exposes Backstage scaffolder actions as MCP tools for AI clients
# AI clients (GitHub Copilot) can connect to: http://localhost:7007/api/mcp-actions/v1
# See https://backstage.io/docs/features/mcp-actions/
mcpActions:
  # Static bearer token for AI client authentication (set via env var)
  # Generate with: openssl rand -hex 32
  # Add to your MCP client config as: Authorization: Bearer <token>
  auth:
    externalAccess:
      enabled: ${MCP_ACTIONS_AUTH_ENABLED:-false}
      token: ${MCP_ACTIONS_TOKEN}

# GitHub Events — webhook routing for real-time catalog updates
# Configure webhook in GitHub: https://github.com/organizations/Ohorizons/settings/hooks
# Payload URL: http://<your-host>/api/events/http/github
# Content type: application/json
# Secret: must match GITHUB_WEBHOOK_SECRET env var
events:
  modules:
    github:
      webhookSecret: ${GITHUB_WEBHOOK_SECRET}
