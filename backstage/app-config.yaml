app:
  title: Open Horizons — Agentic DevOps Platform
  baseUrl: http://localhost:3000

organization:
  name: Open Horizons

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
    keys:
      - secret: ${BACKEND_SECRET:-supersecret-dev-only}
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    img-src: ["'self'", 'data:', 'https://avatars.githubusercontent.com', 'https://*.githubusercontent.com']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}
    ### Example for how to add your GitHub Enterprise instance using the API:
    # - host: ghe.example.net
    #   apiBaseUrl: https://ghe.example.net/api/v3
    #   token: ${GHE_TOKEN}

proxy:
  endpoints:
    '/github/api':
      target: 'https://api.github.com'
      headers:
        Authorization: 'Bearer ${GITHUB_TOKEN}'
        Accept: 'application/vnd.github+json'
        X-GitHub-Api-Version: '2022-11-28'
        User-Agent: 'Backstage'
      changeOrigin: true
      allowedMethods: ['GET']
      credentials: forward

    '/github-api':
      target: 'https://api.github.com'
      headers:
        Authorization: 'Bearer ${GITHUB_TOKEN}'
        Accept: 'application/vnd.github+json'
        X-GitHub-Api-Version: '2022-11-28'
        User-Agent: 'Backstage'
      changeOrigin: true
      allowedMethods: ['GET']
      credentials: forward

    # AI Chat Agent — Python FastAPI backend with Claude SDK
    '/agent-api':
      target: 'http://localhost:8008'
      changeOrigin: true
      allowedMethods: ['GET', 'POST']
      credentials: forward

    # AI Impact Agent — Python FastAPI backend with MAF + ChromaDB
    '/ai-impact':
      target: 'http://localhost:8011'
      changeOrigin: true
      allowedMethods: ['GET', 'POST']
      credentials: forward

    # ArgoCD — GitOps deployment tracking
    '/argocd/api':
      target: 'https://localhost:8443/api/v1'
      changeOrigin: true
      secure: false
      headers:
        Cookie: 'argocd.token=${ARGOCD_AUTH_TOKEN}'

    # Grafana — Observability dashboards
    '/grafana/api':
      target: 'http://localhost:3000'
      changeOrigin: true
      headers:
        Authorization: 'Bearer ${GRAFANA_TOKEN}'

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'docker' # Alternatives - 'local'
  publisher:
    type: 'local' # Alternatives - 'googleGcs' or 'awsS3'. Read documentation for using alternatives.

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  providers:
    # GitHub OAuth — requires GITHUB_APP_CLIENT_ID and GITHUB_APP_CLIENT_SECRET env vars
    # Create a GitHub OAuth App at: https://github.com/organizations/Ohorizons/settings/applications
    # Callback URL: http://localhost:7007/api/auth/github/handler/frame
    github:
      development:
        clientId: ${GITHUB_APP_CLIENT_ID}
        clientSecret: ${GITHUB_APP_CLIENT_SECRET}
        scopes:
          - repo
          - codespace
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods: []

# ArgoCD plugin configuration
argocd:
  baseUrl: https://localhost:8443
  appLocatorMethods:
    - type: 'config'
      instances:
        - name: local
          url: https://localhost:8443
          token: ${ARGOCD_AUTH_TOKEN}

# Grafana plugin configuration
grafana:
  domain: http://localhost:3000
  unifiedAlerting: true

# Lighthouse plugin configuration
lighthouse:
  baseUrl: http://localhost:7007/api/lighthouse

# Cost Insights (demo data — no cloud provider required)
copilot:
  host: github.com
  organization: Ohorizons

costInsights:
  engineerCost: 200000
  products:
    computeEngine:
      name: Azure Compute
    cloudStorage:
      name: Azure Storage
    bigQuery:
      name: Azure SQL
  metrics:
    DAU:
      name: Daily Active Users
      default: true

