    # Platform Self-Registration
    # -----------------------------------------------------------------
    - type: file
      target: ../../catalog-info.yaml

    # -----------------------------------------------------------------
    # Organization Data (groups, users, domain, systems)
    # -----------------------------------------------------------------
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group, Domain, System]

    # -----------------------------------------------------------------
    # Platform Entities (components, APIs, resources)
    # -----------------------------------------------------------------
    - type: file
      target: ../../examples/entities.yaml

    # -----------------------------------------------------------------
    # H1 Foundation Golden Path Templates (6)
