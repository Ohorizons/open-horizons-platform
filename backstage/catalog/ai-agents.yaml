---
# =============================================================================
# AI AGENT SYSTEM — Catalog Entities
# =============================================================================
# Registers all AI agents as first-class citizens in the Backstage Software
# Catalog. Each agent is a Component (type: agent) under the ai-agents System.
# =============================================================================

# -----------------------------------------------------------------------------
# System
# -----------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ai-agents
  title: AI Agent System
  description: |
    Multi-agent AI system with 7 specialized agents for CI/CD diagnostics,
    test coverage, security scanning, planning, observability, infrastructure,
    and general orchestration. Powered by Azure OpenAI (GPT-5.1) with real
    GitHub API integration via the Ohorizons org.
  tags:
    - h3-innovation
    - ai
    - agents
    - mcp
  links:
    - url: https://github.com/Ohorizons/ohorizons-demo/tree/main/backstage/server/agent-api
      title: Agent API Source
      icon: github
spec:
  owner: group:default/platform-engineering
  domain: open-horizons-platform

---
# -----------------------------------------------------------------------------
# Agent Components
# -----------------------------------------------------------------------------
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: agent-pipeline
  title: "Pipeline — CI/CD Diagnostics"
  description: |
    Diagnoses GitHub Actions pipeline failures using real workflow run data.
    Fetches recent runs, drills into failed jobs/steps, and provides actionable
    remediation. Hands off to @sentinel for test-related failures.
  annotations:
    github.com/project-slug: Ohorizons/ohorizons-demo
    ohorizons.ai/agent-name: pipeline
    ohorizons.ai/rbac-level: deployer
    ohorizons.ai/cost-tier: medium
    ohorizons.ai/model: gpt-5.1
    ohorizons.ai/temperature: "0.3"
  tags:
    - agent
    - ci-cd
    - github-actions
    - h3-innovation
  links:
    - url: https://github.com/Ohorizons/ohorizons-demo/blob/main/backstage/server/agent-api/agents/pipeline.py
      title: Agent Source
      icon: github
spec:
  type: agent
  owner: group:default/platform-engineering
  lifecycle: production
  system: ai-agents
  providesApis:
    - agent-chat-api
  dependsOn:
    - resource:default/mcp-ecosystem

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: agent-sentinel
  title: "Sentinel — Test & Coverage"
  description: |
    Analyzes CI check runs and pull requests to assess test quality and coverage.
    Shows passing/failing checks with output summaries and recommends improvements.
    Receives handoffs from @pipeline for test-related failures.
  annotations:
    github.com/project-slug: Ohorizons/ohorizons-demo
    ohorizons.ai/agent-name: sentinel
    ohorizons.ai/rbac-level: contributor
    ohorizons.ai/cost-tier: medium
    ohorizons.ai/model: gpt-5.1
    ohorizons.ai/temperature: "0.3"
  tags:
    - agent
    - testing
    - coverage
    - h3-innovation
  links:
    - url: https://github.com/Ohorizons/ohorizons-demo/blob/main/backstage/server/agent-api/agents/sentinel.py
      title: Agent Source
      icon: github
spec:
  type: agent
  owner: group:default/platform-engineering
  lifecycle: production
  system: ai-agents
  providesApis:
    - agent-chat-api

