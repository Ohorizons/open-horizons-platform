---
# =============================================================================
# MCP SERVER REGISTRY — Catalog Entities
# =============================================================================
# Registers all MCP (Model Context Protocol) servers as kind: Resource in the
# Backstage catalog. Each server provides tools that agents can discover and
# invoke at runtime for documentation search and reference data.
# =============================================================================

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: mcp-ecosystem
  title: MCP Ecosystem Server
  description: |
    Aggregator MCP server exposing 14 tool sources for documentation search,
    methodology reference, and agent skill discovery. Runs as a sidecar in
    the ai-services namespace on AKS.
  annotations:
    github.com/project-slug: Ohorizons/open-horizons-platform
    ohorizons.ai/image: acrohorizonsdev.azurecr.io/mcp-ecosystem:v7.2.4
  tags:
    - mcp
    - ecosystem
    - h3-innovation
  links:
    - url: https://github.com/Ohorizons/open-horizons-platform/tree/main/mcp-servers
      title: MCP Server Source
      icon: github
spec:
  type: mcp-server
  owner: group:default/platform-engineering
  system: ai-agents

---
# Individual MCP tool sources (registered as sub-resources)

apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: mcp-backstage-docs
  title: "MCP: Backstage Documentation"
  description: Searches official Backstage (Spotify) documentation for plugin guides, API references, and configuration.
  tags: [mcp, documentation, backstage]
spec:
  type: mcp-tool-source
  owner: group:default/platform-engineering
  system: ai-agents
  dependsOn: [resource:default/mcp-ecosystem]

