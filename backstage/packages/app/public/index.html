<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Open Horizons — Complete Agentic DevOps Platform. Accelerate AI maturity across 3 pillars (Developer Productivity, DevOps Lifecycle, Application Platform) and 5 levels (Traditional → Agentic). 28 capabilities, 22 Golden Paths, 17 AI Agents. Built on Backstage, Azure, and GitHub." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ohorizons.ai/" />
    <meta property="og:title" content="Open Horizons — Agentic DevOps Platform" />
    <meta property="og:description" content="Complete Agentic DevOps Platform. Accelerate AI maturity across 3 pillars × 5 levels — 28 capabilities, 22 Golden Paths, 17 AI Agents, 15 MCP Servers. Built on Backstage, Azure, and GitHub." />
    <meta property="og:image" content="https://ohorizons.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Open Horizons" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ohorizons.ai/" />
    <meta name="twitter:title" content="Open Horizons — Agentic DevOps Platform" />
    <meta name="twitter:description" content="Complete Agentic DevOps Platform. Accelerate AI maturity across 3 pillars × 5 levels — 28 capabilities, 22 Golden Paths, 17 AI Agents, 15 MCP Servers. Built on Backstage, Azure, and GitHub." />
    <meta name="twitter:image" content="https://ohorizons.ai/og-image.png" />

    <!-- LinkedIn -->
    <meta property="og:locale" content="en_US" />

    <!-- Additional SEO -->
    <meta name="author" content="Open Horizons" />
    <meta name="keywords" content="Agentic DevOps, Platform Engineering, AI Maturity Framework, Developer Productivity, DevOps Lifecycle, Application Platform, Backstage, Azure, GitHub, AI Agents, Golden Paths, MCP Servers, DORA Metrics, Copilot" />

    <link
      rel="manifest"
      href="<%= publicPath %>/manifest.json"
      crossorigin="use-credentials"
    />
    <link rel="icon" href="<%= publicPath %>/favicon.ico" />
    <link rel="shortcut icon" href="<%= publicPath %>/favicon.ico" />
    <link rel="apple-touch-icon" href="<%= publicPath %>/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="<%= publicPath %>/favicon.ico" />
    <link
      rel="mask-icon"
      href="<%= publicPath %>/safari-pinned-tab.svg"
      color="#5bbad5"
    />
    <title><%= config.getOptionalString('app.title') ?? 'Backstage' %></title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
