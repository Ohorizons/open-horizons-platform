<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 586" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
    <filter id="cs">
