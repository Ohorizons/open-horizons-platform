<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
    <linearGradient id="h1bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F0F6FE"/>
    </linearGradient>
    <linearGradient id="h2bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5FAF0"/>
    </linearGradient>
    <linearGradient id="h3bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FEF5F2"/>
    </linearGradient>
    <filter id="cs">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="880" height="340" rx="12" fill="url(#bg)"/>

  <!-- Timeline bar -->
  <rect x="46" y="20" width="788" height="30" rx="15" fill="#F5F6F8" stroke="#E5E5EA" stroke-width="1"/>
  <text x="72" y="39" fill="#999999" font-size="9.5" font-weight="600" letter-spacing="0.1em">ADOPTION TIMELINE</text>
  <line x1="220" y1="28" x2="220" y2="42" stroke="#DDDDE0" stroke-width="1"/>
  <text x="370" y="39" text-anchor="middle" fill="#999999" font-size="9.5" font-weight="600">90 DAYS</text>
  <line x1="520" y1="28" x2="520" y2="42" stroke="#DDDDE0" stroke-width="1"/>
  <text x="620" y="39" text-anchor="middle" fill="#999999" font-size="9.5" font-weight="600">6 MONTHS</text>
  <line x1="720" y1="28" x2="720" y2="42" stroke="#DDDDE0" stroke-width="1"/>
  <text x="790" y="39" text-anchor="middle" fill="#999999" font-size="9.5" font-weight="600">12 MONTHS</text>

  <!-- ═══ H1 Foundation ═══ card: x=46 y=66 w=250 h=236 -->
  <g filter="url(#cs)">
    <rect x="46" y="66" width="250" height="236" rx="10" fill="url(#h1bg)" stroke="#D4E2F2" stroke-width="1"/>
    <rect x="46" y="66" width="250" height="4" rx="10" fill="#0078D4"/>
  </g>
  <!-- Badge + Title: y=90 -->
  <rect x="62" y="86" width="40" height="26" rx="6" fill="#0078D4"/>
  <text x="82" y="104" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">H1</text>
  <text x="112" y="104" fill="#1A1A1A" font-size="15" font-weight="700">Foundation</text>
  <!-- Description: y=130 (26px below badge bottom) -->
  <text x="62" y="132" fill="#5A5A5A" font-size="11">Enterprise Azure Infrastructure</text>
  <!-- Tags: y=152 (20px below description) -->
  <rect x="62" y="152" width="46" height="24" rx="6" fill="#EBF3FC" stroke="#C4DBF3" stroke-width="0.5"/>
  <text x="85" y="168" text-anchor="middle" fill="#0063B1" font-size="9.5" font-weight="600">AKS</text>
  <rect x="114" y="152" width="68" height="24" rx="6" fill="#EBF3FC" stroke="#C4DBF3" stroke-width="0.5"/>
  <text x="148" y="168" text-anchor="middle" fill="#0063B1" font-size="9.5" font-weight="600">Terraform</text>
  <rect x="188" y="152" width="68" height="24" rx="6" fill="#EBF3FC" stroke="#C4DBF3" stroke-width="0.5"/>
  <text x="222" y="168" text-anchor="middle" fill="#0063B1" font-size="9.5" font-weight="600">Key Vault</text>
  <!-- Separator: y=194 (18px below tags bottom) -->
  <line x1="62" y1="194" x2="280" y2="194" stroke="#E4EBF4" stroke-width="1"/>
  <!-- Metrics: y=224 (30px below separator) -->
  <text x="62" y="224" fill="#0078D4" font-size="22" font-weight="800">6</text>
  <text x="80" y="224" fill="#7A7A7A" font-size="11" font-weight="400">golden paths</text>
  <text x="176" y="224" fill="#0078D4" font-size="22" font-weight="800">16</text>
  <text x="200" y="224" fill="#7A7A7A" font-size="11" font-weight="400">TF modules</text>
  <!-- Footer: y=252 (28px below metrics) -->
  <text x="62" y="252" fill="#9A9A9A" font-size="10">Core infrastructure and security</text>

  <!-- Arrow H1→H2 -->
  <line x1="306" y1="184" x2="322" y2="184" stroke="#C0D0E0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,179 330,184 320,189" fill="#B8C8D8"/>

  <!-- ═══ H2 Enhancement ═══ card: x=315 y=66 w=250 h=236 -->
  <g filter="url(#cs)">
    <rect x="315" y="66" width="250" height="236" rx="10" fill="url(#h2bg)" stroke="#DAE8D4" stroke-width="1"/>
    <rect x="315" y="66" width="250" height="4" rx="10" fill="#7FBA00"/>
  </g>
  <rect x="331" y="86" width="40" height="26" rx="6" fill="#7FBA00"/>
  <text x="351" y="104" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">H2</text>
  <text x="381" y="104" fill="#1A1A1A" font-size="15" font-weight="700">Enhancement</text>
  <text x="331" y="132" fill="#5A5A5A" font-size="11">Platform Engineering and GitOps</text>
  <!-- Tags -->
  <rect x="331" y="152" width="58" height="24" rx="6" fill="#F0F7E6" stroke="#CCDFB0" stroke-width="0.5"/>
  <text x="360" y="168" text-anchor="middle" fill="#5A8A00" font-size="9.5" font-weight="600">ArgoCD</text>
  <rect x="395" y="152" width="68" height="24" rx="6" fill="#F0F7E6" stroke="#CCDFB0" stroke-width="0.5"/>
  <text x="429" y="168" text-anchor="middle" fill="#5A8A00" font-size="9.5" font-weight="600">Backstage</text>
  <rect x="469" y="152" width="60" height="24" rx="6" fill="#F0F7E6" stroke="#CCDFB0" stroke-width="0.5"/>
  <text x="499" y="168" text-anchor="middle" fill="#5A8A00" font-size="9.5" font-weight="600">Grafana</text>
  <line x1="331" y1="194" x2="549" y2="194" stroke="#E0EAD8" stroke-width="1"/>
  <!-- Metrics -->
  <text x="331" y="224" fill="#7FBA00" font-size="22" font-weight="800">10</text>
  <text x="359" y="224" fill="#7A7A7A" font-size="11" font-weight="400">golden paths</text>
  <text x="453" y="224" fill="#7FBA00" font-size="22" font-weight="800">5</text>
  <text x="471" y="224" fill="#7A7A7A" font-size="11" font-weight="400">dashboards</text>
  <text x="331" y="252" fill="#9A9A9A" font-size="10">Developer portal and governance</text>

  <!-- Arrow H2→H3 -->
  <line x1="575" y1="184" x2="591" y2="184" stroke="#D0C0C0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="589,179 599,184 589,189" fill="#D8B8B0"/>

  <!-- ═══ H3 Innovation ═══ card: x=584 y=66 w=250 h=236 -->
  <g filter="url(#cs)">
    <rect x="584" y="66" width="250" height="236" rx="10" fill="url(#h3bg)" stroke="#F0D8CF" stroke-width="1"/>
    <rect x="584" y="66" width="63" height="4" rx="10" fill="#F25022"/>
    <rect x="647" y="66" width="62" height="4" fill="#7FBA00"/>
    <rect x="709" y="66" width="62" height="4" fill="#00A4EF"/>
    <rect x="771" y="66" width="63" height="4" rx="10" fill="#FFB900"/>
  </g>
  <rect x="600" y="86" width="40" height="26" rx="6" fill="#F25022"/>
  <text x="620" y="104" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">H3</text>
  <text x="650" y="104" fill="#1A1A1A" font-size="15" font-weight="700">Innovation</text>
  <text x="600" y="132" fill="#5A5A5A" font-size="11">AI Agents and Agentic SDLC</text>
  <!-- Tags -->
  <rect x="600" y="152" width="54" height="24" rx="6" fill="#FCEAE5" stroke="#F0C5B7" stroke-width="0.5"/>
  <text x="627" y="168" text-anchor="middle" fill="#C43F1A" font-size="9.5" font-weight="600">Agents</text>
  <rect x="660" y="152" width="44" height="24" rx="6" fill="#FCEAE5" stroke="#F0C5B7" stroke-width="0.5"/>
  <text x="682" y="168" text-anchor="middle" fill="#C43F1A" font-size="9.5" font-weight="600">MCP</text>
  <rect x="710" y="152" width="44" height="24" rx="6" fill="#FCEAE5" stroke="#F0C5B7" stroke-width="0.5"/>
  <text x="732" y="168" text-anchor="middle" fill="#C43F1A" font-size="9.5" font-weight="600">RAG</text>
  <rect x="760" y="152" width="58" height="24" rx="6" fill="#FCEAE5" stroke="#F0C5B7" stroke-width="0.5"/>
  <text x="789" y="168" text-anchor="middle" fill="#C43F1A" font-size="9.5" font-weight="600">Copilot</text>
  <line x1="600" y1="194" x2="818" y2="194" stroke="#F2DDD5" stroke-width="1"/>
  <!-- Metrics -->
  <text x="600" y="224" fill="#F25022" font-size="22" font-weight="800">18</text>
  <text x="628" y="224" fill="#7A7A7A" font-size="11" font-weight="400">golden paths</text>
  <text x="722" y="224" fill="#F25022" font-size="22" font-weight="800">18</text>
  <text x="750" y="224" fill="#7A7A7A" font-size="11" font-weight="400">agents</text>
  <text x="600" y="252" fill="#9A9A9A" font-size="10">AI intelligence and autonomy</text>

  <!-- Bottom bar -->
  <rect x="46" y="320" width="197" height="3" rx="1.5" fill="#F25022"/>
  <rect x="243" y="320" width="197" height="3" fill="#7FBA00"/>
  <rect x="440" y="320" width="197" height="3" fill="#00A4EF"/>
  <rect x="637" y="320" width="197" height="3" rx="1.5" fill="#FFB900"/>
</svg>
