<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Four Pillars of Platform Control</title>
  <desc id="desc">Governance, security, reliability, and experience pillars.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="70" text-anchor="middle" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#1b1b1f">Four Pillars of Platform Control</text>
  <g font-family="Segoe UI, Arial" text-anchor="middle">
    <rect x="110" y="150" width="150" height="230" rx="8" fill="#e5f4ff" stroke="#00a4ef" stroke-width="2"/>
    <rect x="290" y="150" width="150" height="230" rx="8" fill="#ffebe5" stroke="#f25022" stroke-width="2"/>
    <rect x="470" y="150" width="150" height="230" rx="8" fill="#e8f5e9" stroke="#7fba00" stroke-width="2"/>
    <rect x="650" y="150" width="150" height="230" rx="8" fill="#fff8e1" stroke="#ffb900" stroke-width="2"/>
    <text x="185" y="265" font-size="18" font-weight="700">Governance</text>
    <text x="365" y="265" font-size="18" font-weight="700">Security</text>
    <text x="545" y="265" font-size="18" font-weight="700">Reliability</text>
    <text x="725" y="265" font-size="18" font-weight="700">Experience</text>
  </g>
</svg>