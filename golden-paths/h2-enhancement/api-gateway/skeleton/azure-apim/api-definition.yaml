openapi: "3.0.3"
info:
  title: ${{ values.gatewayName }}
  description: API Gateway definition for ${{ values.gatewayName }}
  version: "1.0.0"
  contact:
    name: Platform Team
    email: platform@ohorizons.ai

servers:
  - url: https://${{ values.gatewayName }}.azure-api.net
    description: Azure APIM endpoint

paths:
{%- for api in values.apis %}
  /${{ api.name }}:
    get:
      operationId: get-${{ api.name }}
      summary: Get ${{ api.name }} resources
      tags:
        - ${{ api.name }}
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
{%- endfor %}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
