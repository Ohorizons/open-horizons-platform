---
# Envoy Bootstrap Configuration for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

node:
  id: ${{ values.gatewayName }}
  cluster: ${{ values.gatewayName }}-cluster
  metadata:
    gateway_name: ${{ values.gatewayName }}

stats_config:
  stats_tags:
    - tag_name: gateway
      fixed_value: ${{ values.gatewayName }}
  use_all_default_tags: true

layered_runtime:
  layers:
    - name: static_layer
      static_layer:
        envoy.reloadable_features.strict_check_on_copy_in_move: false
        local_rate_limit_enabled: true
        local_rate_limit_enforced: true
    - name: admin_layer
      admin_layer: {}
