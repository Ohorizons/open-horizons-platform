---
# Envoy Proxy Configuration for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
static_resources:
  listeners:
    - name: ${{ values.gatewayName }}-listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ${{ values.gatewayName }}
                codec_type: AUTO
                generate_request_id: true
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: ${{ values.gatewayName }}
                      domains:
                        - "*"
                      cors:
                        allow_origin_string_match:
                          - safe_regex:
                              regex: ".*"
                        allow_methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
                        allow_headers: "Content-Type, Authorization, X-Request-ID"
                        max_age: "300"
                      response_headers_to_add:
                        - header:
                            key: x-gateway
                            value: ${{ values.gatewayName }}
                      routes:
{%- for api in values.apis %}
                        - match:
                            prefix: /api/${{ api.name }}
                          route:
                            cluster: ${{ api.name }}_cluster
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes
                              num_retries: 3
                              per_try_timeout: 10s
                              retriable_status_codes:
                                - 503
{%- endfor %}
                http_filters:
                  # Rate limiting
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rate_limiter
                      token_bucket:
                        max_tokens: ${{ values.rateLimits }}
                        tokens_per_fill: ${{ values.rateLimits }}
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-rate-limit
                            value: "${{ values.rateLimits }}/min"
                  # CORS
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  # Router (must be last)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
{%- for api in values.apis %}
    - name: ${{ api.name }}_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 5s
      load_assignment:
        cluster_name: ${{ api.name }}_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${{ api.name }}.default.svc.cluster.local
                      port_value: ${{ api.port | default('8080') }}
      health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /healthz
      circuit_breakers:
        thresholds:
          - max_connections: 100
            max_pending_requests: 100
            max_requests: 100
            max_retries: 3
{%- endfor %}
