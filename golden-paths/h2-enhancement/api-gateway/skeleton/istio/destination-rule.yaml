---
# Istio DestinationRule for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
{%- for api in values.apis %}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: ${{ values.gatewayName }}-${{ api.name }}
  labels:
    app.kubernetes.io/name: ${{ values.gatewayName }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: backstage
spec:
  host: ${{ api.name }}.default.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
        maxRetries: 3
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
{%- endfor %}
