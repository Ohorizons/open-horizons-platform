---
# Istio Gateway for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ${{ values.gatewayName }}-gateway
  labels:
    app.kubernetes.io/name: ${{ values.gatewayName }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: ${{ values.gatewayName }}-tls
      hosts:
        - ${{ values.gatewayName }}.ohorizons.ai
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - ${{ values.gatewayName }}.ohorizons.ai
      tls:
        httpsRedirect: true
