---
# Istio VirtualService for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ${{ values.gatewayName }}
  labels:
    app.kubernetes.io/name: ${{ values.gatewayName }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: backstage
spec:
  hosts:
    - ${{ values.gatewayName }}.ohorizons.ai
  gateways:
    - ${{ values.gatewayName }}-gateway
  http:
{%- for api in values.apis %}
    - name: ${{ api.name }}-route
      match:
        - uri:
            prefix: /api/${{ api.name }}
      rewrite:
        uri: /
      route:
        - destination:
            host: ${{ api.name }}.default.svc.cluster.local
            port:
              number: ${{ api.port | default('8080') }}
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes
        retriableStatusCodes:
          - 503
      corsPolicy:
        allowOrigins:
          - regex: ".*"
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowHeaders:
          - Content-Type
          - Authorization
          - X-Request-ID
        maxAge: "300s"
      headers:
        response:
          add:
            x-gateway: ${{ values.gatewayName }}
{%- endfor %}
