---
# Kong Declarative Configuration for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
_format_version: "3.0"
_transform: true

services:
{%- for api in values.apis %}
  - name: ${{ values.gatewayName }}-${{ api.name }}
    url: http://${{ api.name }}.default.svc.cluster.local:${{ api.port | default('8080') }}
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    retries: 3
    routes:
      - name: ${{ values.gatewayName }}-${{ api.name }}-route
        paths:
          - /api/${{ api.name }}
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
        strip_path: true
        preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: ${{ values.rateLimits }}
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
            - X-Request-ID
          max_age: 300
      - name: jwt
        config:
          key_claim_name: kid
          claims_to_verify:
            - exp
{%- endfor %}

consumers:
  - username: ${{ values.gatewayName }}-default-consumer
    jwt_secrets:
      - key: ${{ values.gatewayName }}-jwt-key
        algorithm: RS256
