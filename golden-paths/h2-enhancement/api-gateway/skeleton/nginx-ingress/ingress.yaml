---
# NGINX Ingress for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.gatewayName }}
  labels:
    app.kubernetes.io/name: ${{ values.gatewayName }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: backstage
  annotations:
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "${{ values.rateLimits }}"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-max-age: "300"

    # SSL
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"

    # Custom NGINX snippet for JWT and headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Gateway: ${{ values.gatewayName }}";
      more_set_headers "X-Request-ID: $request_id";

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${{ values.gatewayName }}.ohorizons.ai
      secretName: ${{ values.gatewayName }}-tls
  rules:
    - host: ${{ values.gatewayName }}.ohorizons.ai
      http:
        paths:
{%- for api in values.apis %}
          - path: /api/${{ api.name }}
            pathType: Prefix
            backend:
              service:
                name: ${{ api.name }}
                port:
                  number: ${{ api.port | default('8080') }}
{%- endfor %}
