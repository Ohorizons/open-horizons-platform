---
# NGINX ConfigMap snippets for ${{ values.gatewayName }}
# Generated by Open Horizons Golden Path
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ values.gatewayName }}-nginx-config
  labels:
    app.kubernetes.io/name: ${{ values.gatewayName }}
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: backstage
data:
  # Main NGINX snippet applied to all locations
  server-snippet: |
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request ID
    set $request_id_header $http_x_request_id;
    if ($request_id_header = "") {
      set $request_id_header $request_id;
    }

    # Health check endpoint
    location /healthz {
      access_log off;
      return 200 "ok";
      add_header Content-Type text/plain;
    }

    # Block sensitive paths
    location ~* /(\.env|\.git|\.svn|wp-admin|wp-login) {
      return 404;
    }

  # Upstream keepalive
  upstream-keepalive-connections: "32"
  upstream-keepalive-timeout: "60"

  # Logging format with request ID
  log-format-upstream: >-
    $remote_addr - $remote_user [$time_local]
    "$request" $status $body_bytes_sent
    "$http_referer" "$http_user_agent"
    $request_id $upstream_response_time $request_time

  # Proxy buffer settings
  proxy-buffer-size: "16k"
  proxy-buffers-number: "4"

  # Client body limits
  client-max-body-size: "10m"
