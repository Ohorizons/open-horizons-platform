name: create-codespace

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git reference to open in Codespace
        required: false
        default: main
        type: string

permissions:
  contents: read
  codespaces: write

jobs:
  create:
    name: Create Codespace
    runs-on: ubuntu-latest
    steps:
      - name: Skip when a codespace already exists
        id: existing
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const list = await github.request('GET /repos/{owner}/{repo}/codespaces', {
              owner,
              repo,
              per_page: 1,
            });

            const hasCodespace = (list.data.total_count || 0) > 0;
            core.setOutput('has_codespace', hasCodespace ? 'true' : 'false');
            if (hasCodespace) {
              core.notice('Codespace already exists. Skipping auto-create.');
            }

      - name: Create Codespace via GitHub API
        if: ${{ steps.existing.outputs.has_codespace != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = core.getInput('ref') || 'main';

            const response = await github.request('POST /repos/{owner}/{repo}/codespaces', {
              owner,
              repo,
              ref,
            });

            core.notice(`Codespace created: ${response.data.name}`);
            if (response.data.web_url) {
              core.notice(`Open URL: ${response.data.web_url}`);
            }
