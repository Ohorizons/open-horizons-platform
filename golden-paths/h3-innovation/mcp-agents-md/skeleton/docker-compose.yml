services:
  ${{ values.name }}:
    build: .
    container_name: ${{ values.name }}
    restart: unless-stopped
    ports:
      - "${{ values.port }}:${{ values.port }}"
    env_file:
      - .env
    environment:
      - PORT=${{ values.port }}
      - CACHE_DIR=/app/cache
    volumes:
      - mcp-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${{ values.port }}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mcp-cache:
    driver: local
