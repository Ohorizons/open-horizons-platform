services:
  mcp-ecosystem:
    build: .
    container_name: mcp-ecosystem
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env
    environment:
      - PORT=3100
      - CACHE_DIR=/app/cache
    volumes:
      - mcp-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mcp-cache:
    driver: local
